<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pedido de Namoro 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #ffe0f0 50%, #f8bbd0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
            position: relative;
            transition: background 0.6s ease;
        }

        body.festa-body {
            background: linear-gradient(145deg, #fce4ec, #fff3e0, #e8f5e8);
            background-size: 300% 300%;
            animation: gradientWave 4s ease infinite;
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.7) inset;
            width: 100%;
            max-width: 360px;
            padding: 32px 20px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
            z-index: 10;
        }

        .card.festa-mode {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 30px 50px rgba(255, 105, 180, 0.3), 0 0 0 2px #ffb6c1 inset, 0 0 30px #ffd966;
            transform: scale(1.01);
        }

        h1 {
            font-size: 1.8rem;
            color: #b23c5c;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .heart-icon {
            font-size: 2.8rem;
            line-height: 1;
            margin: 12px 0 8px;
            filter: drop-shadow(0 4px 8px #ff99bb);
            animation: softPulse 2s infinite;
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .question {
            font-size: 1.6rem;
            font-weight: 500;
            color: #a5385a;
            margin: 8px 0 24px;
            background: rgba(255, 240, 245, 0.6);
            padding: 12px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .button-area {
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 8px 0;
            width: 100%;
            touch-action: none;
            background: rgba(255, 230, 240, 0.2);
            border-radius: 36px;
            padding: 12px 16px;
        }

        .btn-yes {
            background: #ff80a5;
            border: none;
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 40px;
            box-shadow: 0 8px 0 #b23c5c, 0 12px 20px -8px rgba(255, 128, 165, 0.6);
            cursor: pointer;
            transition: all 0.1s ease;
            letter-spacing: 1px;
            border: 2px solid white;
            min-width: 120px;
            z-index: 20;
            outline: none;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .btn-yes:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b23c5c, 0 8px 15px -5px rgba(255, 128, 165, 0.6);
        }

        .btn-no {
            background: #6b5b7a;
            border: none;
            color: #f0e0e8;
            font-size: 1.5rem;
            font-weight: 500;
            padding: 12px 28px;
            border-radius: 40px;
            box-shadow: 0 6px 0 #3e3347, 0 10px 18px -6px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            border: 2px solid #d7c0d0;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            white-space: nowrap;
            min-width: 100px;
            touch-action: manipulation;
            flex-shrink: 0;
            position: relative; /* mudamos de absolute para relative */
            left: auto;
            top: auto;
            transform: none;
        }

        .btn-no:active {
            filter: brightness(1.1);
        }

        .message-box {
            margin: 16px 0 8px;
            font-size: 1.2rem;
            color: #9e4a6b;
            font-weight: 500;
            background: rgba(255, 240, 245, 0.5);
            padding: 12px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid white;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .hint {
            font-size: 0.95rem;
            color: #8a5c6e;
            opacity: 0.8;
            background: rgba(255, 220, 235, 0.4);
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 8px;
            backdrop-filter: blur(2px);
        }

        /* Animações de comemoração */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 16px;
            background: #ffb3c6;
            opacity: 0.7;
            animation: confettiFall 3s linear infinite;
            border-radius: 20% 50% 20% 50%;
        }

        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
        }

        .heart-float {
            position: absolute;
            color: #ff99bb;
            font-size: 1.8rem;
            animation: heartRise 4s ease-out forwards;
            filter: drop-shadow(0 0 8px #ffb3c6);
        }

        @keyframes heartRise {
            0% { transform: translateY(100vh) scale(0.3); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1500;
            animation: sparklePop 1s ease-out forwards;
        }

        @keyframes sparklePop {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body id="body">
    <div class="confetti" id="confettiContainer" style="display: none;"></div>
    <div class="floating-hearts" id="heartContainer"></div>

    <div class="card" id="card">
        <h1>Meu amor</h1>
        <div class="heart-icon">💗💗💗</div>
        <div class="question">Aceita namorar comigo?</div>

        <div class="button-area" id="buttonArea">
            <button class="btn-yes" id="btnSim">SIM 💖</button>
            <button class="btn-no" id="btnNao">NÃO 💔</button>
        </div>

        <div class="message-box" id="messageBox">a resposta certa é sim</div>
        <div class="hint" id="hint">o "não" tá fugindo 👆</div>
    </div>

    <script>
        (function() {
            const body = document.body;
            const buttonArea = document.getElementById('buttonArea');
            const btnSim = document.getElementById('btnSim');
            const btnNo = document.getElementById('btnNao');
            const messageBox = document.getElementById('messageBox');
            const hint = document.getElementById('hint');
            const card = document.getElementById('card');
            const confettiContainer = document.getElementById('confettiContainer');
            const heartContainer = document.getElementById('heartContainer');

            let ultimaFuga = 0;

            // Função de fuga para o botão NÃO
            function fugirDoToque(touchX, touchY) {
                if (!btnNo) return;

                const agora = Date.now();
                if (agora - ultimaFuga < 60) return;
                ultimaFuga = agora;

                const btnRect = btnNo.getBoundingClientRect();
                const areaRect = buttonArea.getBoundingClientRect();

                // Centro do botão
                const btnCenterX = btnRect.left + btnRect.width/2;
                const btnCenterY = btnRect.top + btnRect.height/2;

                // Distância do toque ao centro
                const distX = touchX - btnCenterX;
                const distY = touchY - btnCenterY;
                const distancia = Math.sqrt(distX*distX + distY*distY);

                // Se o toque está perto (menos de 100px), foge
                if (distancia < 100) {
                    // Direção oposta ao toque
                    const angulo = Math.atan2(distY, distX);
                    let anguloFuga = angulo + Math.PI + (Math.random() - 0.5) * 0.8;
                    
                    // Distância do pulo
                    const pulo = 150 + Math.random() * 100;
                    
                    // Nova posição relativa ao centro atual
                    const novoX = btnCenterX + Math.cos(anguloFuga) * pulo;
                    const novoY = btnCenterY + Math.sin(anguloFuga) * pulo;

                    // Converter para posição relativa ao buttonArea (porque o botão é relative)
                    const novoLeft = novoX - areaRect.left - btnRect.width/2;
                    const novoTop = novoY - areaRect.top - btnRect.height/2;

                    // Limites dentro da buttonArea
                    const maxLeft = areaRect.width - btnRect.width - 10;
                    const maxTop = areaRect.height - btnRect.height - 10;
                    const minLeft = 10;
                    const minTop = 10;

                    let leftFinal = Math.min(maxLeft, Math.max(minLeft, novoLeft));
                    let topFinal = Math.min(maxTop, Math.max(minTop, novoTop));

                    // Se ficou muito perto da borda, joga pro lado oposto
                    if (leftFinal < 20) leftFinal = maxLeft - 30;
                    if (leftFinal > maxLeft - 20) leftFinal = minLeft + 30;
                    if (topFinal < 20) topFinal = maxTop - 30;
                    if (topFinal > maxTop - 20) topFinal = minTop + 30;

                    btnNo.style.position = 'absolute';
                    btnNo.style.left = leftFinal + 'px';
                    btnNo.style.top = topFinal + 'px';
                    btnNo.style.transform = 'none';

                    // Feedback visual
                    btnNo.style.backgroundColor = '#8a759f';
                    setTimeout(() => {
                        if (btnNo) btnNo.style.backgroundColor = '';
                    }, 150);
                }
            }

            // Eventos de toque
            function onTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) fugirDoToque(touch.clientX, touch.clientY);
            }

            function onTouchStart(e) {
                const touch = e.touches[0];
                if (!touch) return;

                const btnRect = btnNo.getBoundingClientRect();
                // Se tocou no botão não, foge imediatamente
                if (touch.clientX >= btnRect.left && touch.clientX <= btnRect.right &&
                    touch.clientY >= btnRect.top && touch.clientY <= btnRect.bottom) {
                    e.preventDefault();
                    fugirDoToque(touch.clientX, touch.clientY);
                    // Fuga dupla pra garantir
                    setTimeout(() => fugirDoToque(touch.clientX + 30, touch.clientY + 30), 30);
                } else {
                    fugirDoToque(touch.clientX, touch.clientY);
                }
            }

            function onNoClick(e) {
                e.preventDefault();
                e.stopPropagation();
                fugirDoToque(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2);
                return false;
            }

            // Festa
            function comemorar() {
                btnNo.style.display = 'none';
                btnSim.style.position = 'relative';
                btnSim.style.left = 'auto';
                btnSim.style.top = 'auto';
                
                card.classList.add('festa-mode');
                body.classList.add('festa-body');
                
                messageBox.innerHTML = '💞 SIM! Vamos namorar! 💞';
                hint.innerHTML = '🥰 pra sempre 💖';
                
                // Confetti
                confettiContainer.style.display = 'block';
                for (let i = 0; i < 60; i++) {
                    const conf = document.createElement('div');
                    conf.className = 'confetti-piece';
                    conf.style.left = Math.random() * 100 + '%';
                    conf.style.animationDelay = Math.random() * 2 + 's';
                    conf.style.background = `hsl(${Math.random() * 60 + 300}, 80%, 70%)`;
                    conf.style.width = (Math.random() * 10 + 4) + 'px';
                    conf.style.height = (Math.random() * 18 + 8) + 'px';
                    confettiContainer.appendChild(conf);
                }

                // Corações
                for (let i = 0; i < 30; i++) {
                    const heart = document.createElement('div');
                    heart.className = 'heart-float';
                    const hearts = ['💗', '💖', '💕', '💓', '💘', '💞'];
                    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
                    heartContainer.appendChild(heart);
                }

                // Brilhos
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const spark = document.createElement('div');
                        spark.className = 'sparkle';
                        spark.style.left = Math.random() * 100 + '%';
                        spark.style.top = Math.random() * 100 + '%';
                        spark.style.width = '10px';
                        spark.style.height = '10px';
                        spark.style.background = `radial-gradient(circle, #ffd9e6, #ff99bb)`;
                        spark.style.borderRadius = '50%';
                        document.body.appendChild(spark);
                        setTimeout(() => spark.remove(), 1000);
                    }, i * 100);
                }

                if (navigator.vibrate) navigator.vibrate(50);

                // Remove eventos
                buttonArea.removeEventListener('touchmove', onTouchMove);
                buttonArea.removeEventListener('touchstart', onTouchStart);
            }

            // Inicialização
            function init() {
                // Eventos de toque
                buttonArea.addEventListener('touchmove', onTouchMove, { passive: false });
                buttonArea.addEventListener('touchstart', onTouchStart, { passive: false });
                
                btnNo.addEventListener('click', onNoClick);
                btnNo.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    if (touch) {
                        fugirDoToque(touch.clientX, touch.clientY);
                    }
                }, { passive: false });

                btnSim.addEventListener('click', comemorar);
                btnSim.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    comemorar();
                });

                // Mouse move para desktop
                document.addEventListener('mousemove', (e) => {
                    if (!btnNo || btnNo.style.display === 'none') return;
                    const btnRect = btnNo.getBoundingClientRect();
                    const distX = e.clientX - (btnRect.left + btnRect.width/2);
                    const distY = e.clientY - (btnRect.top + btnRect.height/2);
                    if (Math.sqrt(distX*distX + distY*distY) < 70) {
                        fugirDoToque(e.clientX, e.clientY);
                    }
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
